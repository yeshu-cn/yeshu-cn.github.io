      <p>都忘记忘记了科学计数法的表示方法了</p>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> <span class="keyword">float</span> MAX_VALUE = <span class="number">3.40282346638528860e+38f</span>;</span><br><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">final</span> <span class="keyword">float</span> MIN_VALUE = <span class="number">1.40129846432481707e-45f</span>;</span><br></pre></td></tr></table></figure>
<p>E是exponent,表示以10为底的指数</p>
<p>这是一种记数的方法。把一个绝对值大于10的实数记为a×10^n的形式（1≤|a|&lt;10，n为整数），这种记数法叫做科学记数法。例如19971400000000=1.99714×10^13。计算器或电脑表达10的的幂是一般是用E或e，也就是1.99714E13=19971400000000。</p>
