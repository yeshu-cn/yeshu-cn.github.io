      <p>场景：<br>选取相册中图片，图片路径中含有中文。此时获取图片<code>Uri</code>需要通过<code>Uri.decode</code>解码一下才能获取带有中文的路径。</p>
<figure class="highlight plain"><table><tr><td class="code"><pre><span class="line">@Override</span><br><span class="line">protected void onActivityResult(int requestCode, int resultCode, Intent data) &#123;</span><br><span class="line">       &#x2F;&#x2F;data.getDataString()返回的string是经过url编码的</span><br><span class="line">        String path &#x3D; Uri.decode(data.getDataString());</span><br><span class="line"></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p><code>intent.getDataString()</code>返回的是经过url编码的字符串</p>
