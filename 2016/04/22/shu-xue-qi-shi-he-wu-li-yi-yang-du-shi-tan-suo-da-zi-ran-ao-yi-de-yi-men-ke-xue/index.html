  <div class="article-content">
    
      <p>最近看了信息简史，宇宙之书，中国哲学简史 ，无言的宇宙等书，发现其实每一个数学符号，公式的形成过程中都包含了先人们对其现实实用性和宇宙哲学上的思考。非常有意思。而不仅仅是上学时的机械化记忆，用于解决算术问题那么简单。</p>
<p>数学不仅仅是工具，其实和物理一样，都是探索大自然奥义的一门科学（例如存在π这样的一个数值的事实就是有一个物理现象）。</p>
