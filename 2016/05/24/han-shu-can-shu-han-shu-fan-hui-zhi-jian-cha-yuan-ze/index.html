  <div class="article-content">
    
      <ol>
<li>函数参数检查原则：<strong>只有public方法才进行参数检查</strong>。private方法参数不需要检查，因为一般如果参数不合法还去调用私有方法，说明自身内部代码逻辑有问题。</li>
<li>函数返回值检查原则：该返回值可能会造成该函数内代码崩溃<strong>一定要进行检查</strong></li>
</ol>
<p>函数说明时使用注解,明确说明不接受<code>Null</code></p>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">openTaskDetails</span><span class="params">(@NonNull Task requestedTask)</span></span>;</span><br><span class="line"></span><br><span class="line"> <span class="function"><span class="keyword">void</span> <span class="title">completeTask</span><span class="params">(@NonNull Task completedTask)</span></span>;</span><br><span class="line"></span><br><span class="line"> <span class="function"><span class="keyword">void</span> <span class="title">activateTask</span><span class="params">(@NonNull Task activeTask)</span></span>;</span><br></pre></td></tr></table></figure>
<p>函数实现中参数检查</p>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="meta">@Override</span></span><br><span class="line">  <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">openTaskDetails</span><span class="params">(@NonNull Task requestedTask)</span> </span>&#123;</span><br><span class="line">      checkNotNull(requestedTask, <span class="string">"requestedTask cannot be null!"</span>);</span><br><span class="line">      mTasksView.showTaskDetailsUi(requestedTask.getId());</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">public</span> <span class="keyword">static</span> &lt;T&gt; <span class="function">T <span class="title">checkNotNull</span><span class="params">(T reference)</span> </span>&#123;</span><br><span class="line">      <span class="keyword">if</span> (reference == <span class="keyword">null</span>) &#123;</span><br><span class="line">          <span class="keyword">throw</span> <span class="keyword">new</span> NullPointerException();</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="keyword">return</span> reference;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">public</span> <span class="keyword">static</span> &lt;T&gt; <span class="function">T <span class="title">checkNotNull</span><span class="params">(T reference, @Nullable Object errorMessage)</span> </span>&#123;</span><br><span class="line">      <span class="keyword">if</span> (reference == <span class="keyword">null</span>) &#123;</span><br><span class="line">          <span class="keyword">throw</span> <span class="keyword">new</span> NullPointerException(String.valueOf(errorMessage));</span><br><span class="line">      &#125;</span><br><span class="line">      <span class="keyword">return</span> reference;</span><br><span class="line">  &#125;</span><br></pre></td></tr></table></figure>
