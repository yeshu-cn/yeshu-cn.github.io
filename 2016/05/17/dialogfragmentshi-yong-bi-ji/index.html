      <ol>
<li><p>DialogFragment默认边框有黑色阴影</p>
</li>
<li><p>去掉黑色阴影</p>
</li>
</ol>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="meta">@Override</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">onCreate</span><span class="params">(Bundle savedInstanceState)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">super</span>.onCreate(savedInstanceState);</span><br><span class="line"></span><br><span class="line">    setStyle(STYLE_NORMAL, R.style.Theme_Common_Dialog_Alert);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight xml"><table><tr><td class="code"><pre><span class="line"><span class="meta">&lt;?xml version="1.0" encoding="utf-8"?&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">resources</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">style</span> <span class="attr">name</span>=<span class="string">"Theme.Common.Dialog.Alert"</span> <span class="attr">parent</span>=<span class="string">"android:Theme.Panel"</span>&gt;</span></span><br><span class="line"><span class="xml">    	<span class="comment">&lt;!-- 让Dialog背景为灰色，默认false是背景高亮 --&gt;</span>	</span></span><br><span class="line"><span class="xml">        <span class="tag">&lt;<span class="name">item</span> <span class="attr">name</span>=<span class="string">"android:backgroundDimEnabled"</span>&gt;</span>true<span class="tag">&lt;/<span class="name">item</span>&gt;</span></span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">style</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">resources</span>&gt;</span></span><br></pre></td></tr></table></figure>

<ol start="3">
<li>设置Dialog固定宽高,在xml中设置是无效的</li>
</ol>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="meta">@Override</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">onResume</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="keyword">super</span>.onResume();</span><br><span class="line">    <span class="keyword">if</span> (getShowsDialog()) &#123;</span><br><span class="line">        <span class="comment">//Dialog显示时，设置Dialog的固定宽度。</span></span><br><span class="line">        getDialog().getWindow().setLayout(getActivity().getResources().getDimensionPixelSize(R.dimen.dialog_min_width), LinearLayout.LayoutParams.WRAP_CONTENT);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>


<ol start="4">
<li>设置Dialog无标题，点击外部是否消失</li>
</ol>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line">  <span class="meta">@Override</span></span><br><span class="line">  <span class="function"><span class="keyword">public</span> View <span class="title">onCreateView</span><span class="params">(LayoutInflater inflater, ViewGroup container, Bundle savedInstanceState)</span> </span>&#123;</span><br><span class="line">      <span class="keyword">if</span> (getShowsDialog()) &#123;</span><br><span class="line">          getDialog().requestWindowFeature(Window.FEATURE_NO_TITLE);</span><br><span class="line">          getDialog().setCanceledOnTouchOutside(<span class="keyword">false</span>);</span><br><span class="line">      &#125;</span><br><span class="line">	</span><br><span class="line"><span class="comment">//....</span></span><br><span class="line">  &#125;</span><br></pre></td></tr></table></figure>
