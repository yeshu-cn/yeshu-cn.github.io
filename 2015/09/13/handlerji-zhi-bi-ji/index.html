  <div class="article-content">
    
      <ul>
<li>Looper和MessageQueue是一一对应关系，创建Looper时会自动创建一个MessageQueue</li>
<li>一个Looper可以绑定很多个handler</li>
<li>Activity启动时会UI线程会自动Looper.prepare()创建一个Looper</li>
<li>一个线程只有一个Looper，但可以有很多个handler</li>
</ul>
