      <p><strong>数组在除了3种情况外, 其他时候都要”退化”成指向首元素的指针</strong></p>
<p> 比如对 char s[10] = “china”;  这3中例外情况是:  </p>
<ol>
<li>sizeof(s) </li>
<li>&s;</li>
<li>用来初始化s的”china”;</li>
</ol>
<p>除了上述3种情况外,s都会退化成&amp;s[0], 这就是数组变量的操作方式</p>
