      <ul>
<li>handler发送消息给主线程更新ui</li>
<li>Activity的<code>runOnUiThread()</code>方法。</li>
</ul>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * Runs the specified action on the UI thread. If the current thread is the UI</span></span><br><span class="line"><span class="comment"> * thread, then the action is executed immediately. If the current thread is</span></span><br><span class="line"><span class="comment"> * not the UI thread, the action is posted to the event queue of the UI thread.</span></span><br><span class="line"><span class="comment"> *</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@param</span> action the action to run on the UI thread</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">final</span> <span class="keyword">void</span> <span class="title">runOnUiThread</span><span class="params">(Runnable action)</span> </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (Thread.currentThread() != mUiThread) &#123;</span><br><span class="line">        mHandler.post(action);</span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">        action.run();</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<ul>
<li><code>View.post(Runnable r)</code>方法。</li>
</ul>
<figure class="highlight java"><table><tr><td class="code"><pre><span class="line"><span class="keyword">boolean</span> android.view.View .post(Runnable action)</span><br><span class="line"></span><br><span class="line"><span class="comment">//Causes the Runnable to be added to the message queue. The runnable will be //run on the user interface thread.</span></span><br></pre></td></tr></table></figure>

<ul>
<li>BroadcastReceiver运行在主线程，可以更新UI。同样其中不能进行耗时操作</li>
</ul>
