      <p>WindowManagerService负责接收和派发消息</p>
<ul>
<li>一个线程用于循环接收消息，并将消息放入消息队列</li>
<li>一个线程用于从消息队列中去消息，并将消息加工处理发送给对应的窗口</li>
</ul>
<p>View收到消息后，先判断是否拦截，在确定是否处理事件。<br>如果拦截，自己处理事件。如果不处理，将事件返回给父View处理。<br>如果不拦截，将事件传递给子View</p>
